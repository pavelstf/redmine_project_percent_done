name: Static checks

on:
  push:
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Ruby syntax
        run: |
          ruby -c init.rb
          find lib app test -name "*.rb" -print0 | xargs -0 -n1 ruby -c
          ruby -c app/views/project_percent_done/show.api.rsb

      - name: YAML locales
        run: ruby -e 'require "yaml"; Dir["config/locales/*.yml"].each { |f| YAML.load_file(f) }'

      - name: ERB templates
        run: ruby -rerb -e 'Dir["app/views/**/*.erb"].each { |f| RubyVM::InstructionSequence.compile(ERB.new(File.read(f)).src) }'
